<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comparison Report</title>
<style>
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #6b7280;
    --border: #e5e7eb; --card: #fff;
    --green: #059669; --red: #dc2626; --amber: #d97706; --blue: #2563eb;
    --green-bg: #ecfdf5; --red-bg: #fef2f2; --amber-bg: #fffbeb; --blue-bg: #eff6ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111; --fg: #e5e7eb; --muted: #9ca3af;
      --border: #374151; --card: #1f2937;
      --green-bg: #064e3b; --red-bg: #7f1d1d; --amber-bg: #78350f; --blue-bg: #1e3a5f;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; padding: 2rem; max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  h2 { font-size: 1.1rem; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
  .meta { color: var(--muted); font-size: 0.8125rem; margin-bottom: 1.25rem; }

  .gate-banner { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; font-weight: 600; font-size: 1.1rem; }
  .gate-banner.pass { background: var(--green-bg); border: 1px solid var(--green); color: var(--green); }
  .gate-banner.fail { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); }
  .gate-icon { font-size: 1.5rem; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem 1rem; }
  .stat-val { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.amber { color: var(--amber); }

  .agg-table { width: 100%; border-collapse: collapse; margin-bottom: 0.5rem; font-size: 0.875rem; }
  .agg-table th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid var(--border); font-weight: 600; }
  .agg-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .agg-table .num { text-align: right; }

  .task-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .task-table th { text-align: left; padding: 0.625rem 0.75rem; border-bottom: 2px solid var(--border); font-weight: 600; position: sticky; top: 0; background: var(--bg); }
  .task-table td { padding: 0.625rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .task-table .num { text-align: right; font-variant-numeric: tabular-nums; }

  .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .badge.improved { background: var(--green-bg); color: var(--green); }
  .badge.regressed { background: var(--red-bg); color: var(--red); }
  .badge.stable { background: var(--blue-bg); color: var(--blue); }
  .badge.skipped { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .badge.error { background: var(--amber-bg); color: var(--amber); }

  .delta { font-weight: 600; }
  .delta.pos { color: var(--green); }
  .delta.neg { color: var(--red); }
  .delta.zero { color: var(--muted); }

  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .drill { font-size: 0.75rem; white-space: nowrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="./compare-data.js"></script>
<script>
function render(d) {
  if (!d) { document.getElementById('root').innerHTML = '<p>No comparison data.</p>'; return; }

  document.title = `Comparison — ${d.passed ? 'PASS' : 'FAIL'}`;

  const fmtNum = (v, digits = 3) => v == null ? 'n/a' : v.toFixed(digits);
  const fmtPct = (v) => v == null ? 'n/a' : (v * 100).toFixed(1) + '%';
  const fmtTokens = (v) => v == null ? 'n/a' : v.toLocaleString();

  let html = `
    <h1>A/B Comparison Report</h1>
    <div class="meta">
      Baseline: <code>${esc(d.baselineDir)}</code><br>
      Candidate: <code>${esc(d.candidateDir)}</code>
    </div>

    <div class="gate-banner ${d.passed ? 'pass' : 'fail'}">
      <span class="gate-icon">${d.passed ? '\u2705' : '\u274C'}</span>
      Gate: ${d.passed ? 'PASS' : 'FAIL'}
      ${d.softFailed ? '<span style="font-weight:400;font-size:0.875rem;margin-left:0.5rem">(soft-fail: ' + esc(d.softFailReason) + ')</span>' : ''}
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val">${d.comparedCount}</div><div class="stat-label">Compared</div></div>
      <div class="stat"><div class="stat-val green">${d.measurableGains}</div><div class="stat-label">Gains</div></div>
      <div class="stat"><div class="stat-val red">${d.qualityRegressions}</div><div class="stat-label">Regressions</div></div>
      <div class="stat"><div class="stat-val amber">${d.scoringFailures}</div><div class="stat-label">Scoring Failures</div></div>
      <div class="stat"><div class="stat-val">${d.skippedNotRelevant}</div><div class="stat-label">Skipped</div></div>
    </div>`;

  // Aggregate table
  const b = d.baselineTotals;
  const c = d.candidateTotals;
  html += `
    <h2>Aggregate Metrics</h2>
    <table class="agg-table">
      <thead><tr><th>Variant</th><th class="num">Runs</th><th class="num">Avg Score</th><th class="num">Success Rate</th><th class="num">Total Tokens</th></tr></thead>
      <tbody>
        <tr><td>Baseline</td><td class="num">${b.runCount}</td><td class="num">${fmtNum(b.avgScore)}</td><td class="num">${fmtPct(b.successRate)}</td><td class="num">${fmtTokens(b.totalTokens)}</td></tr>
        <tr><td>Candidate</td><td class="num">${c.runCount}</td><td class="num">${fmtNum(c.avgScore)}</td><td class="num">${fmtPct(c.successRate)}</td><td class="num">${fmtTokens(c.totalTokens)}</td></tr>
      </tbody>
    </table>`;

  // Per-task comparison table
  html += `
    <h2>Per-Task Results</h2>
    <table class="task-table">
      <thead><tr><th>Task</th><th>Agent</th><th class="num">Baseline</th><th class="num">Candidate</th><th class="num">Score Delta</th><th class="num">Tokens</th><th class="num">Duration</th><th>Status</th><th>Details</th></tr></thead>
      <tbody>`;

  for (const comp of d.comparisons) {
    const bScore = fmtNum(comp.baseline?.score);
    const cScore = fmtNum(comp.candidate?.score);

    let statusBadge, deltaStr;
    if (!comp.relevant) {
      statusBadge = '<span class="badge skipped">Skipped</span>';
      deltaStr = '<span class="delta zero">—</span>';
    } else if (comp.scoringFailure) {
      statusBadge = '<span class="badge error">Error</span>';
      deltaStr = '<span class="delta zero">—</span>';
    } else if (comp.qualityImproved) {
      statusBadge = '<span class="badge improved">Improved</span>';
      deltaStr = '<span class="delta pos">+' + fmtNum(comp.qualityDelta) + '</span>';
    } else if (comp.qualityRegressed) {
      statusBadge = '<span class="badge regressed">Regressed</span>';
      deltaStr = '<span class="delta neg">' + fmtNum(comp.qualityDelta) + '</span>';
    } else if (comp.efficiencyGain) {
      statusBadge = '<span class="badge improved">Efficiency</span>';
      deltaStr = '<span class="delta zero">0.000</span>';
    } else {
      statusBadge = '<span class="badge stable">Stable</span>';
      deltaStr = '<span class="delta zero">0.000</span>';
    }

    const fmtDelta = (v, unit) => {
      if (v == null) return '<span class="delta zero">—</span>';
      const abs = unit === 'ms' ? (Math.abs(v) / 1000).toFixed(1) + 's' : Math.abs(v).toLocaleString();
      if (v < 0) return '<span class="delta pos">\u2193' + abs + '</span>';
      if (v > 0) return '<span class="delta neg">\u2191' + abs + '</span>';
      return '<span class="delta zero">0</span>';
    };

    const bLink = comp.baseline?.folderName ? '<a class="drill" href="' + esc(d.baselineDirName) + '/' + esc(comp.baseline.folderName) + '/eval-result.html">baseline</a>' : '';
    const cLink = comp.candidate?.folderName ? '<a class="drill" href="' + esc(d.candidateDirName) + '/' + esc(comp.candidate.folderName) + '/eval-result.html">candidate</a>' : '';

    html += '<tr>' +
      '<td>' + esc(comp.task) + '</td>' +
      '<td>' + esc(comp.agent) + '</td>' +
      '<td class="num">' + bScore + '</td>' +
      '<td class="num">' + cScore + '</td>' +
      '<td class="num">' + deltaStr + '</td>' +
      '<td class="num">' + fmtDelta(comp.tokenDelta) + '</td>' +
      '<td class="num">' + fmtDelta(comp.durationDelta, 'ms') + '</td>' +
      '<td>' + statusBadge + '</td>' +
      '<td>' + [bLink, cLink].filter(Boolean).join(' \u00b7 ') + '</td>' +
      '</tr>';
  }

  html += '</tbody></table>';

  document.getElementById('root').innerHTML = html;
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = String(s ?? '');
  return el.innerHTML;
}

render(typeof compareData !== 'undefined' ? compareData : null);
</script>
</body>
</html>
