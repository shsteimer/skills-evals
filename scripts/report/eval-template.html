<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eval Result</title>
<style>
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #6b7280;
    --border: #e5e7eb; --card: #fff;
    --green: #059669; --red: #dc2626; --amber: #d97706; --blue: #2563eb;
    --green-bg: #ecfdf5; --red-bg: #fef2f2; --amber-bg: #fffbeb; --blue-bg: #eff6ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111; --fg: #e5e7eb; --muted: #9ca3af;
      --border: #374151; --card: #1f2937;
      --green-bg: #064e3b; --red-bg: #7f1d1d; --amber-bg: #78350f; --blue-bg: #1e3a5f;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.6; padding: 2rem; max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  h2 { font-size: 1.1rem; margin: 1.5rem 0 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
  h3 { font-size: 0.95rem; margin: 1rem 0 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .meta { color: var(--muted); font-size: 0.875rem; margin-bottom: 1rem; }
  .score-banner { display: flex; align-items: center; gap: 1.5rem; padding: 1rem 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; }
  .score-banner.pass { background: var(--green-bg); border: 1px solid var(--green); }
  .score-banner.fail { background: var(--red-bg); border: 1px solid var(--red); }
  .score-num { font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .score-banner.pass .score-num { color: var(--green); }
  .score-banner.fail .score-num { color: var(--red); }
  .score-label { font-size: 0.875rem; color: var(--muted); }
  .score-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .score-banner.pass .score-bar-fill { background: var(--green); }
  .score-banner.fail .score-bar-fill { background: var(--red); }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
  .metric { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 0.625rem 0.875rem; }
  .metric-val { font-size: 1.25rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .metric-label { font-size: 0.6875rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .summary { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }

  /* 3-column insights layout */
  .insights { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  @media (max-width: 768px) { .insights { grid-template-columns: 1fr; } }
  .insight-col { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; }
  .insight-col h3 { margin-top: 0; font-size: 0.8125rem; }
  .insight-col.strengths h3 { color: var(--green); }
  .insight-col.weaknesses h3 { color: var(--red); }
  .insight-col.observations h3 { color: var(--blue); }

  /* Criteria sections */
  .criteria-section { margin-bottom: 1rem; }
  .criteria-section-title { font-size: 0.9rem; font-weight: 600; padding: 0.5rem 0.75rem; background: var(--card); border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; }
  .criteria-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .criteria-table th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid var(--border); font-weight: 600; }
  .criteria-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  .criteria-table tr:last-child td { border-bottom: none; }
  .criteria-section .criteria-table { border: 1px solid var(--border); border-radius: 0 0 6px 6px; }
  .criteria-section .criteria-table th:first-child, .criteria-section .criteria-table td:first-child { padding-left: 0.75rem; }

  .badge { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .badge.met { background: var(--green-bg); color: var(--green); }
  .badge.not-met { background: var(--red-bg); color: var(--red); }
  .badge.critical { background: var(--red-bg); color: var(--red); }
  .badge.important { background: var(--amber-bg); color: var(--amber); }
  .badge.bonus { background: var(--blue-bg); color: var(--blue); }
  .badge.check { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .badge.judgment { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .points { font-variant-numeric: tabular-nums; font-weight: 600; }
  .points.earned { color: var(--green); }
  .points.not-earned { color: var(--red); }
  .points.zero { color: var(--muted); }
  .notes { color: var(--muted); font-size: 0.8125rem; margin-top: 0.25rem; }
  ul.list { list-style: none; padding: 0; }
  ul.list li { padding: 0.375rem 0; padding-left: 1.25rem; position: relative; font-size: 0.875rem; }
  ul.list li::before { content: ''; position: absolute; left: 0; top: 0.75rem; width: 6px; height: 6px; border-radius: 50%; }
  ul.strengths li::before { background: var(--green); }
  ul.weaknesses li::before { background: var(--red); }
  ul.observations li::before { background: var(--blue); }

  /* Screenshots */
  .screenshots { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; }
  .screenshot { background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; width: 140px; }
  .screenshot img { width: 100%; height: 90px; object-fit: cover; display: block; cursor: pointer; }
  .screenshot img:hover { opacity: 0.8; }
  .screenshot .caption { padding: 0.375rem 0.5rem; font-size: 0.6875rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; cursor: pointer; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; }

  /* Links row */
  .links { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .links a { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 6px; font-size: 0.8125rem; color: var(--blue); text-decoration: none; }
  .links a:hover { border-color: var(--blue); }
</style>
</head>
<body>
<div id="root"></div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('active')"><img id="lightbox-img"></div>
<script src="./eval-data.js"></script>
<script>
function render(d, m) {
  if (!d) { document.getElementById('root').innerHTML = '<p>No evaluation data.</p>'; return; }

  const pass = d.overallSuccess;
  const scoreFmt = typeof d.score === 'number' ? String(d.score) : 'N/A';
  const maxScore = typeof d.maxScore === 'number' ? d.maxScore : null;
  const maxFmt = maxScore !== null ? String(maxScore) : '?';
  const pct = (typeof d.score === 'number' && maxScore) ? (d.score / maxScore * 100) : 0;

  document.title = `${d.task} \u2014 ${d.agent} \u2014 ${scoreFmt}`;

  let html = `
    <h1>${esc(d.task)}</h1>
    <div class="meta">${esc(d.agent)}</div>
    <div class="score-banner ${pass ? 'pass' : 'fail'}">
      <div>
        <div class="score-num">${scoreFmt}</div>
        <div class="score-label">/ ${maxFmt}</div>
      </div>
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${Math.min(pct, 100)}%"></div></div>
      <div class="badge ${pass ? 'met' : 'not-met'}">${pass ? 'PASS' : 'FAIL'}</div>
    </div>`;

  // Run metrics
  if (m) {
    const dur = typeof m.durationMs === 'number' ? (m.durationMs / 1000).toFixed(1) + 's' : null;
    const tok = m.tokenUsage;
    html += '<div class="metrics">';
    if (dur) html += `<div class="metric"><div class="metric-val">${dur}</div><div class="metric-label">Duration</div></div>`;
    if (tok?.totalTokens) html += `<div class="metric"><div class="metric-val">${tok.totalTokens.toLocaleString()}</div><div class="metric-label">Total Tokens</div></div>`;
    if (tok?.inputTokens) html += `<div class="metric"><div class="metric-val">${tok.inputTokens.toLocaleString()}</div><div class="metric-label">Input Tokens</div></div>`;
    if (tok?.outputTokens) html += `<div class="metric"><div class="metric-val">${tok.outputTokens.toLocaleString()}</div><div class="metric-label">Output Tokens</div></div>`;
    if (tok?.costUsd) html += `<div class="metric"><div class="metric-val">$${tok.costUsd.toFixed(4)}</div><div class="metric-label">Est. Cost</div></div>`;
    html += '</div>';
  }

  // Summary
  if (d.summary) {
    html += `<div class="summary">${esc(d.summary)}</div>`;
  }

  // Strengths / Weaknesses / Observations — 3-column layout up front
  const hasInsights = d.strengths?.length || d.weaknesses?.length || d.observations?.length;
  if (hasInsights) {
    html += '<div class="insights">';
    html += `<div class="insight-col strengths"><h3>STRENGTHS</h3>`;
    if (d.strengths?.length) {
      html += `<ul class="list strengths">${d.strengths.map(s => `<li>${esc(s)}</li>`).join('')}</ul>`;
    } else {
      html += '<p style="color:var(--muted);font-size:0.875rem">None noted</p>';
    }
    html += '</div>';
    html += `<div class="insight-col weaknesses"><h3>WEAKNESSES</h3>`;
    if (d.weaknesses?.length) {
      html += `<ul class="list weaknesses">${d.weaknesses.map(s => `<li>${esc(s)}</li>`).join('')}</ul>`;
    } else {
      html += '<p style="color:var(--muted);font-size:0.875rem">None noted</p>';
    }
    html += '</div>';
    html += `<div class="insight-col observations"><h3>OBSERVATIONS</h3>`;
    if (d.observations?.length) {
      html += `<ul class="list observations">${d.observations.map(s => `<li>${esc(s)}</li>`).join('')}</ul>`;
    } else {
      html += '<p style="color:var(--muted);font-size:0.875rem">None noted</p>';
    }
    html += '</div></div>';
  }

  // Screenshots (if provided)
  if (d.screenshots?.length) {
    html += '<h2>Screenshots</h2><div class="screenshots">';
    for (const s of d.screenshots) {
      const src = s.path || s.url || '';
      const cap = s.caption || s.label || '';
      html += `<div class="screenshot"><img src="${esc(src)}" alt="${esc(cap)}" onclick="showLightbox(this.src)"><div class="caption">${esc(cap)}</div></div>`;
    }
    html += '</div>';
  }

  // Links to related viewers
  html += '<div class="links">';
  if (d.diffViewerPath) html += `<a href="${esc(d.diffViewerPath)}">View Diff</a>`;
  if (d.conversationViewerPath) html += `<a href="${esc(d.conversationViewerPath)}">View Conversation</a>`;
  html += '</div>';

  // Criteria — grouped by section if available
  if (d.criteriaChecks?.length) {
    html += '<h2>Criteria</h2>';

    const sections = groupBySection(d.criteriaChecks);

    for (const [sectionName, checks] of sections) {
      if (sections.length > 1 && sectionName) {
        html += `<div class="criteria-section"><div class="criteria-section-title">${esc(sectionName)}</div>`;
      }
      html += `<table class="criteria-table"><thead><tr><th>Criterion</th><th>Priority</th><th>Source</th><th>Status</th><th>Points</th></tr></thead><tbody>`;
      for (const c of checks) {
        const cls = c.met ? 'met' : 'not-met';
        const prCls = c.priority || 'important';
        const pts = c.points || 0;
        const ptsCls = pts > 0 ? 'earned' : c.met ? 'zero' : 'not-earned';
        const ptsFmt = pts > 0 ? `+${pts}` : '0';
        const src = c.source || 'judgment';
        html += `<tr>
          <td>${esc(c.name)}${c.notes ? `<div class="notes">${esc(c.notes)}</div>` : ''}</td>
          <td><span class="badge ${prCls}">${prCls}</span></td>
          <td><span class="badge ${src}">${src}</span></td>
          <td><span class="badge ${cls}">${c.met ? 'Met' : 'Not Met'}</span></td>
          <td class="points ${ptsCls}">${ptsFmt}</td>
        </tr>`;
      }
      html += `</tbody></table>`;
      if (sections.length > 1 && sectionName) {
        html += '</div>';
      }
    }
  }

  document.getElementById('root').innerHTML = html;
}

function groupBySection(checks) {
  const ordered = new Map();
  for (const c of checks) {
    const section = c.section || '';
    if (!ordered.has(section)) ordered.set(section, []);
    ordered.get(section).push(c);
  }
  const entries = [...ordered.entries()];
  // If there's only one group with no section name, don't wrap in section div
  if (entries.length === 1 && !entries[0][0]) return entries;
  return entries;
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = String(s);
  return el.innerHTML;
}

function showLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

render(typeof evalData !== 'undefined' ? evalData : null, typeof runMetrics !== 'undefined' ? runMetrics : null);
</script>
</body>
</html>
